name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    timeout-minutes: 60

    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install npm dependencies
        run: npm ci

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: npm-windows-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            npm-windows-

      - name: Setup cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target
          key: cargo-windows-${{ hashFiles('apps/desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-windows-

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: "Easy-Agent Novel Studio ${{ github.ref_name }}"
          releaseBody: |
            ## 更新内容

            ### 下载

            - **.msi**: Windows Installer 包
            - **.exe**: NSIS 安装程序
          releaseDraft: true
          prerelease: false

  build-macos:
    name: Build macOS Bundle
    runs-on: macos-latest
    timeout-minutes: 60

    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install npm dependencies
        run: npm ci

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: npm-macos-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            npm-macos-

      - name: Setup cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target
          key: cargo-macos-${{ hashFiles('apps/desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-macos-

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: "Easy-Agent Novel Studio ${{ github.ref_name }}"
          releaseBody: |
            ## 更新内容

            ### 下载

            - **.dmg**: macOS 安装包
          releaseDraft: true
          prerelease: false
